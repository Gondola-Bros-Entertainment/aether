name: ci

on:
  push:
    branches: [main]
  pull_request:

# Staged pipeline: cheap checks first, expensive last. Each stage runs only if the previous one
# passed (needs:), so the multi-compiler matrix never burns minutes on code the linters or
# sanitizers already rejected:  cppcheck -> sanitizers -> build matrix.
jobs:
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: >
          cppcheck --enable=warning,performance,portability --std=c++20
          --error-exitcode=1 --quiet
          -I include src test bench

  sanitizers:
    name: asan + ubsan
    needs: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configure
        run: cmake -B build -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -g"
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-test:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    needs: sanitizers
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, cc: gcc,   cxx: g++ }
          - { os: ubuntu-latest, cc: clang, cxx: clang++ }
          - { os: macos-latest,  cc: clang, cxx: clang++ }
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure
        run: cmake -B build -DAETHER_WERROR=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure

  windows:
    name: windows / msvc
    needs: sanitizers
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      # Debug, not Release: Release defines NDEBUG, which compiles out every assert() -- the whole
      # test suite checks through assert(), so a Release run is a build check, not a test run. /WX
      # makes MSVC warnings errors, matching the -Werror the gcc/clang legs use.
      - name: Configure
        run: cmake -B build -DAETHER_WERROR=ON
      - name: Build
        run: cmake --build build --config Debug
      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

  # Prove the install/export rules: install aether to a prefix, then consume it from a SEPARATE
  # project via find_package(aether) -> aether::aether. Covers the Windows leg too, where the
  # exported target carries ws2_32/bcrypt. Release on both sides so the imported config matches on
  # multi-config generators (MSVC); -DCMAKE_BUILD_TYPE covers single-config, --config multi-config.
  package:
    name: package / ${{ matrix.os }}
    needs: [build-test, windows]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure aether
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build aether
        run: cmake --build build --target aether --config Release
      - name: Install aether
        run: cmake --install build --prefix "${{ runner.temp }}/aether-prefix" --config Release
      - name: Configure consumer against the installed package
        run: cmake -S test/package -B test/package/build -DCMAKE_PREFIX_PATH="${{ runner.temp }}/aether-prefix" -DCMAKE_BUILD_TYPE=Release
      - name: Build consumer
        run: cmake --build test/package/build --config Release
